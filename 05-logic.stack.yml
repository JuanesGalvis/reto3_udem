# Aqui estaran las lambdas y el api gateway. Este stack se encarga de la logica de negocio y la capa de aplicacion.

AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Aqui estaran las lambdas y el api gateway. Este stack se encarga de la logica de negocio y la capa de aplicacion.
  Incluye APIs REST (buyer/organizer) y WebSocket (estado de asientos en tiempo real).
  Depende del stack database.yaml (debe desplegarse primero).
  Tambien esta la definicion de roles para cada lambda, con permisos limitados a lo necesario (principio de privilegio minimo).

# =====================================================================
#  PARAMETERS
# =====================================================================
Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Ambiente de despliegue

  LambdaCodePrefix:
    Type: String
    Default: lambdas
    Description: Prefijo (carpeta) dentro del bucket para los .zip de las Lambdas

# =====================================================================
#  MAPPINGS
# =====================================================================
Mappings:
  StageConfig:
    dev:
      LogRetentionDays: 14
    staging:
      LogRetentionDays: 30
    prod:
      LogRetentionDays: 90

# =====================================================================
#  RESOURCES
# =====================================================================
Resources:
  # ===================================================================
  #  IAM ROLES
  # ===================================================================

  # ---------- Rol para Lambdas de compradores/usuarios ----------
  CompradoresCrudRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "reto3-${Stage}-compradores_crud"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:BatchWriteItem
                Resource:
                  - !ImportValue
                    Fn::Sub: "reto3-${Stage}-dynamodb-events-table-arn"
                  - !Sub
                    - "${TableArn}/index/*"
                    - TableArn: !ImportValue
                        Fn::Sub: "reto3-${Stage}-dynamodb-events-table-arn"
                  - !ImportValue
                    Fn::Sub: "reto3-${Stage}-dynamodb-seats-table-arn"
                  - !Sub
                    - "${TableArn}/index/*"
                    - TableArn: !ImportValue
                        Fn::Sub: "reto3-${Stage}-dynamodb-seats-table-arn"
        - PolicyName: AuroraDataAPIAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - rds-data:ExecuteStatement
                  - rds-data:BatchExecuteStatement
                  - rds-data:BeginTransaction
                  - rds-data:CommitTransaction
                  - rds-data:RollbackTransaction
                Resource: !ImportValue
                  Fn::Sub: "reto3-${Stage}-aurora-cluster-arn"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !ImportValue
                  Fn::Sub: "reto3-${Stage}-aurora-secret-arn"
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/reto3-${Stage}-buyer-*:*"
        - PolicyName: EventBridgeAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: !ImportValue
                  Fn::Sub: "reto3-${Stage}-eventbridge-bus-arn"

  # ---------- Rol para Lambdas de organizadores ----------
  OrganizadoresCrudRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "reto3-${Stage}-organizadores_crud"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:BatchWriteItem
                Resource:
                  - !ImportValue
                    Fn::Sub: "reto3-${Stage}-dynamodb-events-table-arn"
                  - !Sub
                    - "${TableArn}/index/*"
                    - TableArn: !ImportValue
                        Fn::Sub: "reto3-${Stage}-dynamodb-events-table-arn"
                  - !ImportValue
                    Fn::Sub: "reto3-${Stage}-dynamodb-seats-table-arn"
                  - !Sub
                    - "${TableArn}/index/*"
                    - TableArn: !ImportValue
                        Fn::Sub: "reto3-${Stage}-dynamodb-seats-table-arn"
        - PolicyName: AuroraDataAPIAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - rds-data:ExecuteStatement
                  - rds-data:BatchExecuteStatement
                  - rds-data:BeginTransaction
                  - rds-data:CommitTransaction
                  - rds-data:RollbackTransaction
                Resource: !ImportValue
                  Fn::Sub: "reto3-${Stage}-aurora-cluster-arn"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !ImportValue
                  Fn::Sub: "reto3-${Stage}-aurora-secret-arn"
        - PolicyName: EventBridgeAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: !ImportValue
                  Fn::Sub: "reto3-${Stage}-eventbridge-bus-arn"
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/reto3-${Stage}-org-*:*"
        - PolicyName: S3ReportWriteAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource:
                  - !Sub
                    - "arn:aws:s3:::${BucketName}/*"
                    - BucketName: !ImportValue
                        Fn::Sub: "reto3-${Stage}-reports-bucket-name"
        - PolicyName: S3ReportsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub "arn:aws:s3:::reto3-${Stage}-reports/*"

        - PolicyName: SNSPublishAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !ImportValue
                  Fn::Sub: "reto3-${Stage}-sns-topic-arn"
        - PolicyName: SESEmailAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"
        - PolicyName: SQSConsumeAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !ImportValue
                  Fn::Sub: "reto3-${Stage}-report-queue-arn"

  # ---------- Rol para Lambda WebSocket ----------
  WebSocketLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "reto3-${Stage}-ws-seat-status-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBReadSeats
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource:
                  - !ImportValue
                    Fn::Sub: "reto3-${Stage}-dynamodb-events-table-arn"
                  - !Sub
                    - "${TableArn}/index/*"
                    - TableArn: !ImportValue
                        Fn::Sub: "reto3-${Stage}-dynamodb-events-table-arn"
                  - !ImportValue
                    Fn::Sub: "reto3-${Stage}-dynamodb-seats-table-arn"
                  - !Sub
                    - "${TableArn}/index/*"
                    - TableArn: !ImportValue
                        Fn::Sub: "reto3-${Stage}-dynamodb-seats-table-arn"
        - PolicyName: DynamoDBSocketsManagement
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !ImportValue
                    Fn::Sub: "reto3-${Stage}-dynamodb-sockets-table-arn"
                  - !Sub
                    - "${TableArn}/index/*"
                    - TableArn: !ImportValue
                        Fn::Sub: "reto3-${Stage}-dynamodb-sockets-table-arn"
        - PolicyName: ManageWebSocketConnections
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - execute-api:ManageConnections
                Resource:
                  - !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/${Stage}/POST/@connections/*"
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/reto3-${Stage}-ws-*:*"

  # ---------- Rol para Lambdas de autenticacion ----------
  AuthLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "reto3-${Stage}-auth-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CognitoAuthAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:SignUp
                  - cognito-idp:AdminConfirmSignUp
                  - cognito-idp:AdminAddUserToGroup
                  - cognito-idp:AdminGetUser
                  - cognito-idp:InitiateAuth
                Resource: !Sub
                  - "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${UserPoolId}"
                  - UserPoolId: !ImportValue
                      Fn::Sub: "reto3-${Stage}-cognito-userpool-id"
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/reto3-${Stage}-auth-*:*"
        - PolicyName: AuroraDataAPIAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - rds-data:ExecuteStatement
                Resource: !ImportValue
                  Fn::Sub: "reto3-${Stage}-aurora-cluster-arn"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !ImportValue
                  Fn::Sub: "reto3-${Stage}-aurora-secret-arn"
        - PolicyName: SNSSubscribeAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sns:Subscribe
                Resource: !ImportValue
                  Fn::Sub: "reto3-${Stage}-sns-topic-arn"

  # ===================================================================
  #  CLOUDWATCH LOG GROUPS
  # ===================================================================

  # --- Buyer ---
  LogGroupBuyerGetAllEvents:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/reto3-${Stage}-buyer-get-all-events"
      RetentionInDays: !FindInMap [StageConfig, !Ref Stage, LogRetentionDays]

  LogGroupBuyerGetEventSeats:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/reto3-${Stage}-buyer-get-event-seats"
      RetentionInDays: !FindInMap [StageConfig, !Ref Stage, LogRetentionDays]

  LogGroupBuyerReserveSeat:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/reto3-${Stage}-buyer-reserve-seat"
      RetentionInDays: !FindInMap [StageConfig, !Ref Stage, LogRetentionDays]

  LogGroupBuyerEditReservation:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/reto3-${Stage}-buyer-edit-reservation"
      RetentionInDays: !FindInMap [StageConfig, !Ref Stage, LogRetentionDays]

  LogGroupBuyerCancelReservation:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/reto3-${Stage}-buyer-cancel-reservation"
      RetentionInDays: !FindInMap [StageConfig, !Ref Stage, LogRetentionDays]

  LogGroupBuyerConfirmAttendance:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/reto3-${Stage}-buyer-confirm-attendance"
      RetentionInDays: !FindInMap [StageConfig, !Ref Stage, LogRetentionDays]

  # --- Organizer ---
  LogGroupOrgGetAllEvents:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/reto3-${Stage}-org-get-all-events"
      RetentionInDays: !FindInMap [StageConfig, !Ref Stage, LogRetentionDays]

  LogGroupOrgGetEventSeats:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/reto3-${Stage}-org-get-event-seats"
      RetentionInDays: !FindInMap [StageConfig, !Ref Stage, LogRetentionDays]

  LogGroupOrgCreateEvent:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/reto3-${Stage}-org-create-event"
      RetentionInDays: !FindInMap [StageConfig, !Ref Stage, LogRetentionDays]

  LogGroupOrgEditEvent:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/reto3-${Stage}-org-edit-event"
      RetentionInDays: !FindInMap [StageConfig, !Ref Stage, LogRetentionDays]

  LogGroupOrgDeleteEvent:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/reto3-${Stage}-org-delete-event"
      RetentionInDays: !FindInMap [StageConfig, !Ref Stage, LogRetentionDays]

  LogGroupOrgGenerateReport:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/reto3-${Stage}-org-generate-report"
      RetentionInDays: !FindInMap [StageConfig, !Ref Stage, LogRetentionDays]

  LogGroupOrgCreateAlert:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/reto3-${Stage}-org-create-alert"
      RetentionInDays: !FindInMap [StageConfig, !Ref Stage, LogRetentionDays]

  # --- WebSocket ---
  LogGroupWsSeatStatus:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/reto3-${Stage}-ws-seat-status"
      RetentionInDays: !FindInMap [StageConfig, !Ref Stage, LogRetentionDays]

  # --- Auth ---
  LogGroupAuthSignup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/reto3-${Stage}-auth-signup"
      RetentionInDays: !FindInMap [StageConfig, !Ref Stage, LogRetentionDays]

  LogGroupAuthLogin:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/reto3-${Stage}-auth-login"
      RetentionInDays: !FindInMap [StageConfig, !Ref Stage, LogRetentionDays]

  # ===================================================================
  #  LAMBDA FUNCTIONS - AUTH (registro e inicio de sesion)
  # ===================================================================

  AuthSignupFunction:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupAuthSignup
    Properties:
      FunctionName: !Sub "reto3-${Stage}-auth-signup"
      Runtime: python3.12
      Handler: handler.lambda_handler
      MemorySize: 128
      Timeout: 30
      Role: !GetAtt AuthLambdaRole.Arn
      Code:
        S3Bucket: !ImportValue
          Fn::Sub: "reto3-${Stage}-lambda-code-bucket"
        S3Key: !Sub "${LambdaCodePrefix}/auth-signup.zip"
      Environment:
        Variables:
          STAGE: !Ref Stage
          USER_POOL_ID: !ImportValue
            Fn::Sub: "reto3-${Stage}-cognito-userpool-id"
          CLIENT_ID: !ImportValue
            Fn::Sub: "reto3-${Stage}-cognito-client-id"
          AURORA_CLUSTER_ARN: !ImportValue
            Fn::Sub: "reto3-${Stage}-aurora-cluster-arn"
          AURORA_SECRET_ARN: !ImportValue
            Fn::Sub: "reto3-${Stage}-aurora-secret-arn"
          AURORA_DB_NAME: !ImportValue
            Fn::Sub: "reto3-${Stage}-aurora-db-name"
          SNS_TOPIC_ARN: !ImportValue
            Fn::Sub: "reto3-${Stage}-sns-topic-arn"

  AuthLoginFunction:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupAuthLogin
    Properties:
      FunctionName: !Sub "reto3-${Stage}-auth-login"
      Runtime: python3.12
      Handler: handler.lambda_handler
      MemorySize: 128
      Timeout: 30
      Role: !GetAtt AuthLambdaRole.Arn
      Code:
        S3Bucket: !ImportValue
          Fn::Sub: "reto3-${Stage}-lambda-code-bucket"
        S3Key: !Sub "${LambdaCodePrefix}/auth-login.zip"
      Environment:
        Variables:
          STAGE: !Ref Stage
          CLIENT_ID: !ImportValue
            Fn::Sub: "reto3-${Stage}-cognito-client-id"

  # ===================================================================
  #  LAMBDA FUNCTIONS - BUYER (compradores)
  # ===================================================================

  BuyerGetAllEventsFunction:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupBuyerGetAllEvents
    Properties:
      FunctionName: !Sub "reto3-${Stage}-buyer-get-all-events"
      Runtime: python3.12
      Handler: handler.lambda_handler
      MemorySize: 128
      Timeout: 30
      Role: !GetAtt CompradoresCrudRole.Arn
      Code:
        S3Bucket: !ImportValue
          Fn::Sub: "reto3-${Stage}-lambda-code-bucket"
        S3Key: !Sub "${LambdaCodePrefix}/buyer-get-all-events.zip"
      Environment:
        Variables:
          STAGE: !Ref Stage
          DYNAMODB_EVENTS_TABLE: !ImportValue
            Fn::Sub: "reto3-${Stage}-dynamodb-events-table-name"
          DYNAMODB_SEATS_TABLE: !ImportValue
            Fn::Sub: "reto3-${Stage}-dynamodb-seats-table-name"
          AURORA_CLUSTER_ARN: !ImportValue
            Fn::Sub: "reto3-${Stage}-aurora-cluster-arn"
          AURORA_SECRET_ARN: !ImportValue
            Fn::Sub: "reto3-${Stage}-aurora-secret-arn"
          AURORA_SECRET_NAME: !ImportValue
            Fn::Sub: "reto3-${Stage}-aurora-secret-name"
          AURORA_DB_NAME: !ImportValue
            Fn::Sub: "reto3-${Stage}-aurora-db-name"

  BuyerGetEventSeatsFunction:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupBuyerGetEventSeats
    Properties:
      FunctionName: !Sub "reto3-${Stage}-buyer-get-event-seats"
      Runtime: python3.12
      Handler: handler.lambda_handler
      MemorySize: 128
      Timeout: 30
      Role: !GetAtt CompradoresCrudRole.Arn
      Code:
        S3Bucket: !ImportValue
          Fn::Sub: "reto3-${Stage}-lambda-code-bucket"
        S3Key: !Sub "${LambdaCodePrefix}/buyer-get-event-seats.zip"
      Environment:
        Variables:
          STAGE: !Ref Stage
          DYNAMODB_EVENTS_TABLE: !ImportValue
            Fn::Sub: "reto3-${Stage}-dynamodb-events-table-name"
          DYNAMODB_SEATS_TABLE: !ImportValue
            Fn::Sub: "reto3-${Stage}-dynamodb-seats-table-name"
          AURORA_CLUSTER_ARN: !ImportValue
            Fn::Sub: "reto3-${Stage}-aurora-cluster-arn"
          AURORA_SECRET_ARN: !ImportValue
            Fn::Sub: "reto3-${Stage}-aurora-secret-arn"
          AURORA_SECRET_NAME: !ImportValue
            Fn::Sub: "reto3-${Stage}-aurora-secret-name"
          AURORA_DB_NAME: !ImportValue
            Fn::Sub: "reto3-${Stage}-aurora-db-name"

  BuyerReserveSeatFunction:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupBuyerReserveSeat
    Properties:
      FunctionName: !Sub "reto3-${Stage}-buyer-reserve-seat"
      Runtime: python3.12
      Handler: handler.lambda_handler
      MemorySize: 128
      Timeout: 30
      Role: !GetAtt CompradoresCrudRole.Arn
      Code:
        S3Bucket: !ImportValue
          Fn::Sub: "reto3-${Stage}-lambda-code-bucket"
        S3Key: !Sub "${LambdaCodePrefix}/buyer-reserve-seat.zip"
      Environment:
        Variables:
          STAGE: !Ref Stage
          DYNAMODB_EVENTS_TABLE: !ImportValue
            Fn::Sub: "reto3-${Stage}-dynamodb-events-table-name"
          DYNAMODB_SEATS_TABLE: !ImportValue
            Fn::Sub: "reto3-${Stage}-dynamodb-seats-table-name"
          AURORA_CLUSTER_ARN: !ImportValue
            Fn::Sub: "reto3-${Stage}-aurora-cluster-arn"
          AURORA_SECRET_ARN: !ImportValue
            Fn::Sub: "reto3-${Stage}-aurora-secret-arn"
          AURORA_SECRET_NAME: !ImportValue
            Fn::Sub: "reto3-${Stage}-aurora-secret-name"
          AURORA_DB_NAME: !ImportValue
            Fn::Sub: "reto3-${Stage}-aurora-db-name"
          EVENTBRIDGE_BUS_ARN: !ImportValue
            Fn::Sub: "reto3-${Stage}-eventbridge-bus-arn"
          EVENTBRIDGE_BUS_NAME: !ImportValue
            Fn::Sub: "reto3-${Stage}-eventbridge-bus-name"

  BuyerEditReservationFunction:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupBuyerEditReservation
    Properties:
      FunctionName: !Sub "reto3-${Stage}-buyer-edit-reservation"
      Runtime: python3.12
      Handler: handler.lambda_handler
      MemorySize: 128
      Timeout: 30
      Role: !GetAtt CompradoresCrudRole.Arn
      Code:
        S3Bucket: !ImportValue
          Fn::Sub: "reto3-${Stage}-lambda-code-bucket"
        S3Key: !Sub "${LambdaCodePrefix}/buyer-edit-reservation.zip"
      Environment:
        Variables:
          STAGE: !Ref Stage
          DYNAMODB_EVENTS_TABLE: !ImportValue
            Fn::Sub: "reto3-${Stage}-dynamodb-events-table-name"
          DYNAMODB_SEATS_TABLE: !ImportValue
            Fn::Sub: "reto3-${Stage}-dynamodb-seats-table-name"
          AURORA_CLUSTER_ARN: !ImportValue
            Fn::Sub: "reto3-${Stage}-aurora-cluster-arn"
          AURORA_SECRET_ARN: !ImportValue
            Fn::Sub: "reto3-${Stage}-aurora-secret-arn"
          AURORA_SECRET_NAME: !ImportValue
            Fn::Sub: "reto3-${Stage}-aurora-secret-name"
          AURORA_DB_NAME: !ImportValue
            Fn::Sub: "reto3-${Stage}-aurora-db-name"

  BuyerCancelReservationFunction:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupBuyerCancelReservation
    Properties:
      FunctionName: !Sub "reto3-${Stage}-buyer-cancel-reservation"
      Runtime: python3.12
      Handler: handler.lambda_handler
      MemorySize: 128
      Timeout: 30
      Role: !GetAtt CompradoresCrudRole.Arn
      Code:
        S3Bucket: !ImportValue
          Fn::Sub: "reto3-${Stage}-lambda-code-bucket"
        S3Key: !Sub "${LambdaCodePrefix}/buyer-cancel-reservation.zip"
      Environment:
        Variables:
          STAGE: !Ref Stage
          DYNAMODB_EVENTS_TABLE: !ImportValue
            Fn::Sub: "reto3-${Stage}-dynamodb-events-table-name"
          DYNAMODB_SEATS_TABLE: !ImportValue
            Fn::Sub: "reto3-${Stage}-dynamodb-seats-table-name"
          AURORA_CLUSTER_ARN: !ImportValue
            Fn::Sub: "reto3-${Stage}-aurora-cluster-arn"
          AURORA_SECRET_ARN: !ImportValue
            Fn::Sub: "reto3-${Stage}-aurora-secret-arn"
          AURORA_SECRET_NAME: !ImportValue
            Fn::Sub: "reto3-${Stage}-aurora-secret-name"
          AURORA_DB_NAME: !ImportValue
            Fn::Sub: "reto3-${Stage}-aurora-db-name"

  BuyerConfirmAttendanceFunction:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupBuyerConfirmAttendance
    Properties:
      FunctionName: !Sub "reto3-${Stage}-buyer-confirm-attendance"
      Runtime: python3.12
