    Properties:
      Name: !Sub "reto3-${Stage}-http-api"
      ProtocolType: HTTP
      Description: API REST para compradores y organizadores de eventos
      CorsConfiguration:
        AllowOrigins: ["*"]
        AllowMethods: [GET, POST, PUT, DELETE, OPTIONS]
        AllowHeaders: [Content-Type, Authorization, X-Amz-Date, X-Api-Key]

