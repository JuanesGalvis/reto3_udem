  # ===================================================================
  #  LAMBDA FUNCTION - SEND REMINDERS (recordatorios programados)
  # ===================================================================

  # ---------- Rol para Lambda de recordatorios ----------
  SendRemindersRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "reto3-${Stage}-send-reminders-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBReadAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !ImportValue
                    Fn::Sub: "reto3-${Stage}-dynamodb-seats-table-arn"
                  - !Sub
                    - "${TableArn}/index/*"
                    - TableArn: !ImportValue
                        Fn::Sub: "reto3-${Stage}-dynamodb-seats-table-arn"
        - PolicyName: AuroraDataAPIAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - rds-data:ExecuteStatement
                  - rds-data:BatchExecuteStatement
                Resource: !ImportValue
                  Fn::Sub: "reto3-${Stage}-aurora-cluster-arn"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !ImportValue
                  Fn::Sub: "reto3-${Stage}-aurora-secret-arn"
        - PolicyName: SNSPublishAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !ImportValue
                  Fn::Sub: "reto3-${Stage}-sns-topic-arn"
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/reto3-${Stage}-send-reminders:*"

  LogGroupSendReminders:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/reto3-${Stage}-send-reminders"
      RetentionInDays: !FindInMap [StageConfig, !Ref Stage, LogRetentionDays]

  SendRemindersFunction:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupSendReminders
    Properties:
      FunctionName: !Sub "reto3-${Stage}-send-reminders"
      Runtime: python3.12
      Handler: handler.lambda_handler
      MemorySize: 128
      Timeout: 60
      Role: !GetAtt SendRemindersRole.Arn
      Code:
        S3Bucket: !ImportValue
          Fn::Sub: "reto3-${Stage}-lambda-code-bucket"
        S3Key: !Sub "${LambdaCodePrefix}/send-reminders.zip"
      Environment:
        Variables:
          STAGE: !Ref Stage
          DYNAMODB_SEATS_TABLE: !ImportValue
            Fn::Sub: "reto3-${Stage}-dynamodb-seats-table-name"
          AURORA_CLUSTER_ARN: !ImportValue
            Fn::Sub: "reto3-${Stage}-aurora-cluster-arn"
          AURORA_SECRET_ARN: !ImportValue
            Fn::Sub: "reto3-${Stage}-aurora-secret-arn"
          AURORA_DB_NAME: !ImportValue
            Fn::Sub: "reto3-${Stage}-aurora-db-name"
          SNS_TOPIC_ARN: !ImportValue
            Fn::Sub: "reto3-${Stage}-sns-topic-arn"

  # ---------- Regla programada de EventBridge (cada hora) para recordatorios ----------
  ReminderScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "reto3-${Stage}-reminder-schedule"
      Description: "Ejecuta la Lambda de recordatorios cada hora para verificar eventos proximos"
      ScheduleExpression: "rate(1 hour)"
      State: ENABLED
      Targets:
        - Arn: !GetAtt SendRemindersFunction.Arn
          Id: "SendRemindersTarget"

  PermissionSendReminders:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SendRemindersFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ReminderScheduleRule.Arn

