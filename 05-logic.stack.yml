  # ===================================================================

  HttpApiAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref HttpApi
      AuthorizerType: JWT
      IdentitySource:
        - "$request.header.Authorization"
      Name: cognito-authorizer
      JwtConfiguration:
        Audience:
          - !ImportValue
            Fn::Sub: "reto3-${Stage}-cognito-client-id"
        Issuer: !Sub
          - "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPoolId}"
          - UserPoolId: !ImportValue
              Fn::Sub: "reto3-${Stage}-cognito-userpool-id"

