AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Reto 3 - Pipeline CI/CD con AWS CodePipeline.
  Despliega la infraestructura completa en orden de dependencias:
    Stage 1 (Source)      -> Descarga codigo desde GitHub
    Stage 2 (Build)       -> Empaqueta Lambdas en ZIPs
    Stage 3 (Foundation)  -> Despliega en PARALELO: Database, Integration, Cognito, Artifacts
    Stage 4 (Upload)      -> Sube ZIPs de Lambda al bucket S3 creado en Artifacts
    Stage 5 (Logic)       -> Despliega Lambdas, API Gateway, WebSocket (depende de todo lo anterior)

  IMPORTANTE: Despues de crear este stack, la conexion a GitHub quedara en estado PENDING.
  Debe aprobarse manualmente en la consola de AWS:
    Developer Tools > Settings > Connections > seleccionar la conexion > Update pending connection

# =====================================================================
#  PARAMETERS
# =====================================================================
Parameters:
  GitHubOwner:
    Type: String
    Description: Usuario u organizacion propietaria del repositorio GitHub

  GitHubRepo:
    Type: String
    Description: Nombre del repositorio GitHub

  GitHubBranch:
    Type: String
    Default: main
    Description: Rama del repositorio a monitorear

  Stage:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
    Description: Ambiente de despliegue (dev o prod, compatible con todos los stacks)

# =====================================================================
#  RESOURCES
# =====================================================================
Resources:
  # ===================================================================
  #  CODESTAR CONNECTION (GitHub)
  # ===================================================================
  GitHubConnection:
    Type: AWS::CodeStarConnections::Connection
    Properties:
      ConnectionName: !Sub "reto3-${Stage}-github-connection"
      ProviderType: GitHub

  # ===================================================================
  #  S3 - BUCKET PARA ARTEFACTOS DEL PIPELINE
  # ===================================================================
  PipelineArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "reto3-${Stage}-pipeline-artifacts-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ===================================================================
  #  IAM - ROL PARA CODEPIPELINE
  # ===================================================================
  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "reto3-${Stage}-codepipeline-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipelineBasePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # --- Acceso al bucket de artefactos ---
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource:
                  - !GetAtt PipelineArtifactsBucket.Arn
                  - !Sub "${PipelineArtifactsBucket.Arn}/*"
              # --- Conexion a GitHub ---
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                Resource: !Ref GitHubConnection
              # --- Invocar CodeBuild ---
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource:
                  - !GetAtt PackageLambdasProject.Arn
                  - !GetAtt UploadLambdasProject.Arn
              # --- Desplegar CloudFormation ---
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:GetTemplate
                  - cloudformation:CreateChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:SetStackPolicy
                  - cloudformation:ValidateTemplate
                Resource:
                  - !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/reto3-${Stage}-*/*"
              # --- Pasar rol a CloudFormation ---
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !GetAtt CloudFormationRole.Arn

  # ===================================================================
  #  IAM - ROL PARA CODEBUILD
  # ===================================================================
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "reto3-${Stage}-codebuild-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildBasePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # --- CloudWatch Logs ---
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/reto3-${Stage}-*"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/reto3-${Stage}-*:*"
              # --- Acceso al bucket de artefactos del pipeline ---
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketLocation
                Resource:
                  - !GetAtt PipelineArtifactsBucket.Arn
                  - !Sub "${PipelineArtifactsBucket.Arn}/*"
              # --- Acceso al bucket de codigo Lambda (para subir ZIPs) ---
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::reto3-${Stage}-lambda-code-${AWS::AccountId}"
                  - !Sub "arn:aws:s3:::reto3-${Stage}-lambda-code-${AWS::AccountId}/*"
              # --- Consultar exports de CloudFormation (para obtener nombre del bucket) ---
              - Effect: Allow
                Action:
                  - cloudformation:ListExports
                Resource: "*"

  # ===================================================================
  #  IAM - ROL PARA CLOUDFORMATION (usado por los deploy actions)
  # ===================================================================
  CloudFormationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "reto3-${Stage}-cloudformation-deploy-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      # Permisos minimos necesarios para los recursos que crean los stacks:
      # 01-database (DynamoDB, VPC, RDS Aurora, Secrets Manager, Lambda init)
      # 02-integration (EventBridge, SQS, SNS, SES, S3)
      # 03-cognito (Cognito User Pool)
      # 04-artifacts (S3)
      # 05-logic (Lambda, API Gateway v2, IAM roles, CloudWatch Logs)
      Policies:
        - PolicyName: CloudFormationDeployPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # --- CloudFormation (gestionar stacks hijos) ---
              - Effect: Allow
                Action:
                  - cloudformation:*
                Resource:
                  - !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/reto3-${Stage}-*/*"
              # --- DynamoDB ---
              - Effect: Allow
                Action:
                  - dynamodb:CreateTable
                  - dynamodb:DeleteTable
                  - dynamodb:DescribeTable
                  - dynamodb:UpdateTable
                  - dynamodb:TagResource
                  - dynamodb:UntagResource
                  - dynamodb:ListTagsOfResource
                  - dynamodb:DescribeContinuousBackups
                  - dynamodb:UpdateContinuousBackups
                  - dynamodb:DescribeTimeToLive
                  - dynamodb:UpdateTimeToLive
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/reto3-${Stage}-*"
              # --- VPC, Subnets, Security Groups ---
              - Effect: Allow
                Action:
                  - ec2:CreateVpc
                  - ec2:DeleteVpc
                  - ec2:DescribeVpcs
                  - ec2:ModifyVpcAttribute
                  - ec2:CreateSubnet
                  - ec2:DeleteSubnet
                  - ec2:DescribeSubnets
                  - ec2:CreateSecurityGroup
                  - ec2:DeleteSecurityGroup
                  - ec2:DescribeSecurityGroups
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:AuthorizeSecurityGroupEgress
                  - ec2:RevokeSecurityGroupEgress
                  - ec2:CreateTags
                  - ec2:DeleteTags
                  - ec2:DescribeAvailabilityZones
                Resource: "*"
              # --- RDS Aurora ---
              - Effect: Allow
                Action:
                  - rds:CreateDBCluster
                  - rds:DeleteDBCluster
                  - rds:DescribeDBClusters
                  - rds:ModifyDBCluster
                  - rds:CreateDBInstance
                  - rds:DeleteDBInstance
                  - rds:DescribeDBInstances
                  - rds:ModifyDBInstance
                  - rds:CreateDBSubnetGroup
                  - rds:DeleteDBSubnetGroup
                  - rds:DescribeDBSubnetGroups
                  - rds:AddTagsToResource
                  - rds:RemoveTagsFromResource
                  - rds:ListTagsForResource
                Resource:
                  - !Sub "arn:aws:rds:${AWS::Region}:${AWS::AccountId}:cluster:reto3-${Stage}-*"
                  - !Sub "arn:aws:rds:${AWS::Region}:${AWS::AccountId}:db:reto3-${Stage}-*"
                  - !Sub "arn:aws:rds:${AWS::Region}:${AWS::AccountId}:subgrp:reto3-${Stage}-*"
              # --- Secrets Manager ---
              - Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:DeleteSecret
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetSecretValue
                  - secretsmanager:PutSecretValue
                  - secretsmanager:UpdateSecret
                  - secretsmanager:TagResource
                  - secretsmanager:UntagResource
                Resource:
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:reto3-${Stage}-*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetRandomPassword
                Resource: "*"
              # --- Lambda ---
              - Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:DeleteFunction
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:AddPermission
                  - lambda:RemovePermission
                  - lambda:GetPolicy
                  - lambda:TagResource
                  - lambda:UntagResource
                  - lambda:ListTags
                  - lambda:CreateEventSourceMapping
                  - lambda:DeleteEventSourceMapping
                  - lambda:GetEventSourceMapping
                  - lambda:UpdateEventSourceMapping
                  - lambda:InvokeFunction
                Resource:
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:reto3-${Stage}-*"
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:event-source-mapping:*"
              # --- CloudWatch Logs ---
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:DescribeLogGroups
                  - logs:PutRetentionPolicy
                  - logs:DeleteRetentionPolicy
                  - logs:TagLogGroup
                  - logs:UntagLogGroup
                  - logs:TagResource
                  - logs:UntagResource
                  - logs:ListTagsForResource
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/reto3-${Stage}-*"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/reto3-${Stage}-*:*"
              # --- API Gateway v2 (HTTP + WebSocket) ---
              - Effect: Allow
                Action:
                  - apigateway:POST
                  - apigateway:GET
                  - apigateway:PUT
                  - apigateway:PATCH
                  - apigateway:DELETE
                  - apigateway:TagResource
                  - apigateway:UntagResource
                Resource:
                  - !Sub "arn:aws:apigateway:${AWS::Region}::/apis*"
                  - !Sub "arn:aws:apigateway:${AWS::Region}::/tags/*"
              # --- IAM (roles para Lambdas) ---
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:UpdateRole
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:ListRolePolicies
                  - iam:ListAttachedRolePolicies
                  - iam:PassRole
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:ListRoleTags
                Resource:
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/reto3-${Stage}-*"
              # --- Cognito ---
              - Effect: Allow
                Action:
                  - cognito-idp:CreateUserPool
                  - cognito-idp:DeleteUserPool
                  - cognito-idp:DescribeUserPool
                  - cognito-idp:UpdateUserPool
                  - cognito-idp:CreateUserPoolClient
                  - cognito-idp:DeleteUserPoolClient
                  - cognito-idp:DescribeUserPoolClient
                  - cognito-idp:UpdateUserPoolClient
                  - cognito-idp:CreateGroup
                  - cognito-idp:DeleteGroup
                  - cognito-idp:GetGroup
                  - cognito-idp:UpdateGroup
                  - cognito-idp:TagResource
                  - cognito-idp:UntagResource
                Resource:
                  - !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/*"
              # --- S3 (buckets de reportes y codigo Lambda) ---
              - Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:GetBucketPolicy
                  - s3:PutBucketPolicy
                  - s3:DeleteBucketPolicy
                  - s3:GetBucketTagging
                  - s3:PutBucketTagging
                  - s3:GetBucketVersioning
                  - s3:PutBucketVersioning
                  - s3:GetEncryptionConfiguration
                  - s3:PutEncryptionConfiguration
                  - s3:GetBucketPublicAccessBlock
                  - s3:PutBucketPublicAccessBlock
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::reto3-${Stage}-*"
                  - !Sub "arn:aws:s3:::reto3-${Stage}-*/*"
              # --- EventBridge ---
              - Effect: Allow
                Action:
                  - events:CreateEventBus
                  - events:DeleteEventBus
                  - events:DescribeEventBus
                  - events:PutRule
                  - events:DeleteRule
                  - events:DescribeRule
                  - events:PutTargets
                  - events:RemoveTargets
                  - events:ListTargetsByRule
                  - events:TagResource
                  - events:UntagResource
                Resource:
                  - !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/reto3-${Stage}-*"
                  - !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/reto3-${Stage}-*"
              # --- SQS ---
              - Effect: Allow
                Action:
                  - sqs:CreateQueue
                  - sqs:DeleteQueue
                  - sqs:GetQueueAttributes
                  - sqs:SetQueueAttributes
                  - sqs:GetQueueUrl
                  - sqs:TagQueue
                  - sqs:UntagQueue
                  - sqs:ListQueueTags
                Resource:
                  - !Sub "arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:reto3-${Stage}-*"
              # --- SNS ---
              - Effect: Allow
                Action:
                  - sns:CreateTopic
                  - sns:DeleteTopic
                  - sns:GetTopicAttributes
                  - sns:SetTopicAttributes
                  - sns:TagResource
                  - sns:UntagResource
                  - sns:Subscribe
                  - sns:Unsubscribe
                Resource:
                  - !Sub "arn:aws:sns:${AWS::Region}:${AWS::AccountId}:reto3-${Stage}-*"
              # --- SES ---
              - Effect: Allow
                Action:
                  - ses:CreateEmailIdentity
                  - ses:DeleteEmailIdentity
                  - ses:GetEmailIdentity
                  - ses:TagResource
                  - ses:UntagResource
                Resource:
                  - !Sub "arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/*"

  # ===================================================================
  #  CODEBUILD - PROYECTO: EMPAQUETAR LAMBDAS
  # ===================================================================
  PackageLambdasProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "reto3-${Stage}-package-lambdas"
      Description: Empaqueta cada funcion Lambda (codes/*) en un archivo ZIP
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        EnvironmentVariables:
          - Name: STAGE
            Value: !Ref Stage
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec.yml
      TimeoutInMinutes: 15
      Tags:
        - Key: Project
          Value: reto3
        - Key: Stage
          Value: !Ref Stage

  # ===================================================================
  #  CODEBUILD - PROYECTO: SUBIR LAMBDAS A S3
  # ===================================================================
  UploadLambdasProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "reto3-${Stage}-upload-lambdas"
      Description: Sube los ZIPs de Lambda al bucket S3 creado por el stack de Artifacts
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        EnvironmentVariables:
          - Name: STAGE
            Value: !Ref Stage
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec-upload-lambdas.yml
      TimeoutInMinutes: 10
      Tags:
        - Key: Project
          Value: reto3
        - Key: Stage
          Value: !Ref Stage

  # ===================================================================
  #  CODEPIPELINE
  # ===================================================================
  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub "reto3-${Stage}-pipeline"
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref PipelineArtifactsBucket
      RestartExecutionOnUpdate: false
      Stages:
        # =============================================================
        #  STAGE 1 - SOURCE (GitHub)
        # =============================================================
        - Name: Source
          Actions:
            - Name: GitHubSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: "1"
              Configuration:
                ConnectionArn: !Ref GitHubConnection
                FullRepositoryId: !Sub "${GitHubOwner}/${GitHubRepo}"
                BranchName: !Ref GitHubBranch
                OutputArtifactFormat: CODE_ZIP
                DetectChanges: true
              OutputArtifacts:
                - Name: SourceOutput
              RunOrder: 1

        # =============================================================
        #  STAGE 2 - BUILD (Empaquetar Lambdas)
        # =============================================================
        - Name: Build
          Actions:
            - Name: PackageLambdas
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref PackageLambdasProject
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: BuildOutput
              RunOrder: 1

        # =============================================================
        #  STAGE 3 - DEPLOY FOUNDATION (paralelo: DB, Integration, Cognito, Artifacts)
        #  Estos 4 stacks NO tienen dependencias entre si.
        #  Se despliegan en paralelo usando RunOrder: 1.
        # =============================================================
        - Name: DeployFoundation
          Actions:
            # ---------- 01 - Database ----------
            - Name: DeployDatabase
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: "1"
              Configuration:
                ActionMode: CREATE_UPDATE
                StackName: !Sub "reto3-${Stage}-database"
                TemplatePath: BuildOutput::01-database.stack.yml
                ParameterOverrides: !Sub '{"Stage":"${Stage}"}'
                Capabilities: CAPABILITY_NAMED_IAM
                RoleArn: !GetAtt CloudFormationRole.Arn
              InputArtifacts:
                - Name: BuildOutput
              RunOrder: 1

            # ---------- 02 - Integration ----------
            - Name: DeployIntegration
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: "1"
              Configuration:
                ActionMode: CREATE_UPDATE
                StackName: !Sub "reto3-${Stage}-integration"
                TemplatePath: BuildOutput::02-integration.stack.yml
                ParameterOverrides: !Sub '{"Stage":"${Stage}"}'
                Capabilities: CAPABILITY_IAM
                RoleArn: !GetAtt CloudFormationRole.Arn
              InputArtifacts:
                - Name: BuildOutput
              RunOrder: 1

            # ---------- 03 - Cognito ----------
            - Name: DeployCognito
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: "1"
              Configuration:
                ActionMode: CREATE_UPDATE
                StackName: !Sub "reto3-${Stage}-cognito"
                TemplatePath: BuildOutput::03-cognito.stack.yml
                ParameterOverrides: !Sub '{"Stage":"${Stage}"}'
                Capabilities: CAPABILITY_IAM
                RoleArn: !GetAtt CloudFormationRole.Arn
              InputArtifacts:
                - Name: BuildOutput
              RunOrder: 1

            # ---------- 04 - Artifacts (S3 bucket para codigo Lambda) ----------
            - Name: DeployArtifacts
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: "1"
              Configuration:
                ActionMode: CREATE_UPDATE
                StackName: !Sub "reto3-${Stage}-artifacts"
                TemplatePath: BuildOutput::04-artifacts-stack.yml
                ParameterOverrides: !Sub '{"Stage":"${Stage}"}'
                Capabilities: CAPABILITY_IAM
                RoleArn: !GetAtt CloudFormationRole.Arn
              InputArtifacts:
                - Name: BuildOutput
              RunOrder: 1

        # =============================================================
        #  STAGE 4 - UPLOAD LAMBDAS (sube ZIPs al bucket S3)
        #  Se ejecuta DESPUES de que el bucket exista (stack 04 desplegado).
        # =============================================================
        - Name: UploadLambdas
          Actions:
            - Name: UploadZipsToS3
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref UploadLambdasProject
              InputArtifacts:
                - Name: BuildOutput
              OutputArtifacts:
                - Name: UploadOutput
              RunOrder: 1

        # =============================================================
        #  STAGE 5 - DEPLOY LOGIC (Lambdas + API Gateway + WebSocket)
        #  Depende de TODOS los stacks anteriores:
        #    - Database (DynamoDB tables, Aurora)
        #    - Integration (EventBridge, SQS, SNS, S3 reports)
        #    - Cognito (User Pool para el Authorizer)
        #    - Artifacts (bucket S3 con los ZIPs de Lambda)
        # =============================================================
        - Name: DeployLogic
          Actions:
            - Name: DeployLogicStack
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: "1"
              Configuration:
                ActionMode: CREATE_UPDATE
                StackName: !Sub "reto3-${Stage}-logic"
                TemplatePath: BuildOutput::05-logic.stack.yml
                ParameterOverrides: !Sub '{"Stage":"${Stage}"}'
                Capabilities: CAPABILITY_NAMED_IAM
                RoleArn: !GetAtt CloudFormationRole.Arn
              InputArtifacts:
                - Name: BuildOutput
              RunOrder: 1

# =====================================================================
#  OUTPUTS
# =====================================================================
Outputs:
  PipelineName:
    Description: Nombre del pipeline
    Value: !Ref Pipeline

  PipelineUrl:
    Description: URL de la consola del pipeline
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/codesuite/codepipeline/pipelines/reto3-${Stage}-pipeline/view?region=${AWS::Region}"

  GitHubConnectionArn:
    Description: ARN de la conexion a GitHub (debe aprobarse manualmente en la consola)
    Value: !Ref GitHubConnection

  GitHubConnectionStatus:
    Description: >
      Estado de la conexion. Despues de crear el stack, ir a Developer Tools > Connections
      y aprobar la conexion pendiente para que el pipeline pueda acceder al repositorio.
    Value: PENDING

  PipelineArtifactsBucketName:
    Description: Bucket S3 para artefactos del pipeline
    Value: !Ref PipelineArtifactsBucket
